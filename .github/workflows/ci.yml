name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: pkhamdee/slotmachine

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Static code scan (CodeQL)
  # ──────────────────────────────────────────────────────────────────────────
  code-scan:
    name: Code Scan (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build & unit tests
  # ──────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Client ---------------------------------------------------------------
      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 1

      # Server ---------------------------------------------------------------
      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run server unit tests
        run: npm test
        working-directory: server

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Performance test (Locust)
  # ──────────────────────────────────────────────────────────────────────────
  performance-test:
    name: Performance Test (Locust)
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Start API server
        working-directory: server
        env:
          PORT: 3001
          MONGO_URI: mongodb://localhost:27017/slotmachine_perf
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_DURATION: 180
          LOBBY_DURATION: 3
        run: node server.js &

      - name: Wait for API server to be ready
        run: |
          echo "Waiting for server…"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/sessions/current > /dev/null; then
              echo "Server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Locust
        run: pip install locust requests

      - name: Run Locust performance test
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          locust -f tests/locustfile.py \
            --headless \
            --users 2 \
            --spawn-rate 5 \
            --run-time 60s \
            --host http://localhost:3001 \
            --html tests/locust-report.html

      - name: Upload Locust report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-performance-report
          path: tests/locust-report.html
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Container build → Trivy scan → push to DockerHub
  # ──────────────────────────────────────────────────────────────────────────
  container-build-scan-push:
    name: Container Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [build-and-test, performance-test]
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build images ──────────────────────────────────────────────────────
      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: false
          load: true
          tags: |
            ${{ env.IMAGE }}:client
            ${{ env.IMAGE }}:client-${{ github.sha }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: false
          load: true
          tags: |
            ${{ env.IMAGE }}:server
            ${{ env.IMAGE }}:server-${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      # ── Trivy scans ───────────────────────────────────────────────────────
      - name: Trivy scan — client image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:client
          format: sarif
          output: trivy-client.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          skip-version-check: true

      - name: Upload Trivy client results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-client.sarif
          category: trivy-client

      - name: Trivy scan — server image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:server
          format: sarif
          output: trivy-server.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          skip-version-check: true

      - name: Upload Trivy server results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-server.sarif
          category: trivy-server

      # ── Push to DockerHub (main branch only) ──────────────────────────────
      - name: Log in to DockerHub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push client image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.IMAGE }}:client
            ${{ env.IMAGE }}:client-${{ github.sha }}
          cache-from: type=gha,scope=client

      - name: Push server image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE }}:server
            ${{ env.IMAGE }}:server-${{ github.sha }}
          cache-from: type=gha,scope=server
