name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: pkhamdee/slotmachine
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt-in early; becomes default June 2026

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Static code scan (CodeQL)
  # ──────────────────────────────────────────────────────────────────────────
  code-scan:
    name: Code Scan (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build & unit tests
  # ──────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      # Install all workspace deps from root (single lock file)
      - name: Install all dependencies
        run: npm ci

      # Client ---------------------------------------------------------------
      - name: Run client unit tests
        run: npm test
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Upload client build artifact
        uses: actions/upload-artifact@v7
        with:
          name: client-dist
          path: client/dist
          retention-days: 1

      # Server ---------------------------------------------------------------
      - name: Run server unit tests
        run: npm test
        working-directory: server

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Performance test (Locust)
  # ──────────────────────────────────────────────────────────────────────────
  performance-test:
    name: Performance Test (Locust)
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install all dependencies
        run: npm ci

      - name: Start API server
        working-directory: server
        env:
          PORT: 3001
          MONGO_URI: mongodb://localhost:27017/slotmachine_perf
          REDIS_URL: redis://localhost:6379
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_DURATION: 180
          LOBBY_DURATION: 3
        run: node server.js &

      - name: Wait for API server to be ready
        run: |
          echo "Waiting for server…"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/sessions/current > /dev/null; then
              echo "Server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Locust
        run: pip install locust requests

      - name: Run Locust performance test
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          locust -f tests/locustfile.py \
            --headless \
            --users 2 \
            --spawn-rate 2 \
            --run-time 10s \
            --host http://localhost:3001 \
            --html tests/locust-report.html

      - name: Upload Locust report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: locust-performance-report
          path: tests/locust-report.html
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 4. DAST — OWASP ZAP (runs in parallel with performance-test)
  #    Runs ZAP Docker directly — avoids the action wrappers that use the
  #    deprecated upload-artifact@v3 API (api-version=6.0-preview → 400).
  #    Baseline (passive) on PRs; full scan + Ajax Spider on main push.
  #    Exit code 2 = ZAP warnings only → continue-on-error keeps job green.
  #    Reports uploaded via upload-artifact@v7 (current API).
  # ──────────────────────────────────────────────────────────────────────────
  dast-zap:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start API server
        working-directory: server
        env:
          PORT: 3001
          MONGO_URI: mongodb://localhost:27017/slotmachine_zap
          REDIS_URL: redis://localhost:6379
          ADMIN_PASSWORD: zap-ci-password
          SESSION_DURATION: 180
          LOBBY_DURATION: 10
        run: node server.js &

      - name: Wait for API server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/sessions/current > /dev/null && echo "API ready" && break
            [ $i -eq 30 ] && echo "API did not start in time" && exit 1
            sleep 1
          done

      - name: Pull ZAP image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable -q

      # ZAP Docker runs as a different UID; workspace must be world-writable
      - name: Allow ZAP to write reports to workspace
        run: chmod a+w "${{ github.workspace }}"

      # Passive-only — safe for PRs, no active probes sent to the app
      - name: ZAP Baseline Scan (PR)
        if: github.event_name == 'pull_request'
        continue-on-error: true       # exit 2 = WARN findings; don't fail the job
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:3001 \
              -c .zap/rules.tsv \
              -r zap-report.html \
              -J zap-report.json \
              -w zap-report.md

      # Active + passive + Ajax Spider — main branch push only
      - name: ZAP Full Scan (main push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true       # exit 2 = WARN findings; don't fail the job
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
              -t http://localhost:3001 \
              -c .zap/rules.tsv \
              -r zap-report.html \
              -J zap-report.json \
              -w zap-report.md \
              -a

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-scan-report
          path: |
            zap-report.html
            zap-report.json
            zap-report.md
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Container build → Trivy scan → push to DockerHub
  # ──────────────────────────────────────────────────────────────────────────
  container-build-scan-push:
    name: Container Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [build-and-test, performance-test, dast-zap]
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Build images ──────────────────────────────────────────────────────
      - name: Build client image
        uses: docker/build-push-action@v7
        with:
          context: ./client
          push: false
          load: true
          tags: |
            ${{ env.IMAGE }}:client
            ${{ env.IMAGE }}:client-${{ github.sha }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: false
          load: true
          tags: |
            ${{ env.IMAGE }}:server
            ${{ env.IMAGE }}:server-${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      # ── Trivy scans ───────────────────────────────────────────────────────
      - name: Trivy scan — client image (SARIF for Security tab)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:client
          format: sarif
          output: trivy-client.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          list-all-pkgs: true

      - name: Trivy scan — client image (table for artifact)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:client
          format: table
          output: trivy-client.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy client results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-client.sarif
          category: trivy-client

      - name: Trivy scan — server image (SARIF for Security tab)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:server
          format: sarif
          output: trivy-server.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          list-all-pkgs: true

      - name: Trivy scan — server image (table for artifact)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:server
          format: table
          output: trivy-server.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy server results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-server.sarif
          category: trivy-server

      - name: Upload Trivy table reports as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-scan-reports
          path: |
            trivy-client.txt
            trivy-server.txt
          retention-days: 7

      # ── Push to DockerHub (main branch only) ──────────────────────────────
      - name: Log in to DockerHub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push client image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.IMAGE }}:client
            ${{ env.IMAGE }}:client-${{ github.sha }}
          cache-from: type=gha,scope=client

      - name: Push server image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE }}:server
            ${{ env.IMAGE }}:server-${{ github.sha }}
          cache-from: type=gha,scope=server

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Update GitOps deployment repo with new image tags
  # ──────────────────────────────────────────────────────────────────────────
  update-gitops:
    name: Update GitOps Deployment Repo
    runs-on: ubuntu-latest
    needs: container-build-scan-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v6
        with:
          repository: pkhamdee/slotmachine-deployment
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          ref: development

      - name: Install kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update production overlay image tags
        run: |
          cd overlays/production
          kustomize edit set image \
            slotmachine-client=pkhamdee/slotmachine:client-${{ github.sha }} \
            slotmachine-server=pkhamdee/slotmachine:server-${{ github.sha }}

      - name: Update development overlay image tags
        run: |
          cd overlays/development
          kustomize edit set image \
            slotmachine-client=pkhamdee/slotmachine:client-${{ github.sha }} \
            slotmachine-server=pkhamdee/slotmachine:server-${{ github.sha }}

      - name: Commit and push to deployment repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update images to ${{ github.sha }}

          client: pkhamdee/slotmachine:client-${{ github.sha }}
          server: pkhamdee/slotmachine:server-${{ github.sha }}
          source: pkhamdee/slotmachine@${{ github.sha }}"
          git push origin development
