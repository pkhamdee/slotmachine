services:
  mongodb:
    image: mongo:7
    container_name: slotmachine-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: slotmachine
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: ./server
    container_name: slotmachine-server
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/slotmachine
      SESSION_DURATION: ${SESSION_DURATION:-180}
      LOBBY_DURATION: ${LOBBY_DURATION:-10}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mongodb:
        condition: service_healthy

  client:
    build:
      context: ./client
    container_name: slotmachine-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  mongo_data:
